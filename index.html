<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grocery List</title>
  </head>
  <body>
    <header>
      <figure>
        <img src="src/img/avatar-1.png" alt="User's avatar" />
        <h1>Welcome Andre</h1>
      </figure>
      <button type="button" class="js-add-friend-button">Add friend</button>
    </header>
    <main>
      <section>
        <ul class="js-items__list"></ul>
      </section>
      <button type="button" class="js-add-item-button">Add item</button>
      <section
        class="cart-summary js-summary hidden"
        aria-labelledby="summary-title"
      >
        <h3 id="summary-title" class="visually-hidden"></h3>
        <p class="summary-price"></p>
        <p class="summary-details"></p>
      </section>
    </main>
    <!-- Add item dialog -->
    <dialog id="addItemDialog" aria-labelledby="dialog-title">
      <form method="dialog" class="js-add-item-form">
        <header class="dialog-header">
          <h2 id="dialog-title">New item</h2>

          <button
            type="submit"
            value="cancel"
            aria-label="Close dialog"
            class="dialog-close"
            formnovalidate
          >
            ×
          </button>
        </header>

        <div class="dialog-content">
          <div class="form-field">
            <label for="productName">Product name</label>
            <input id="productName" name="productName" type="text" required />
          </div>

          <div class="form-field">
            <label for="productPrice">Product price</label>
            <input
              id="productPrice"
              name="productPrice"
              type="number"
              inputmode="decimal"
              min="0"
              step="0.01"
              required
            />
          </div>

          <fieldset class="quantity-selector">
            <legend class="visually-hidden">Quantity</legend>

            <button
              type="button"
              aria-label="Decrease quantity"
              data-behavior="remove"
              class="js-btn-qty"
            >
              −
            </button>

            <output id="quantityValue" aria-live="polite"> 2 </output>

            <button
              type="button"
              aria-label="Increase quantity"
              data-behavior="add"
              class="js-btn-qty"
            >
              +
            </button>
          </fieldset>
        </div>

        <footer class="js-dialog-footer"></footer>
      </form>
    </dialog>

    <!-- Edit item dialog -->
    <dialog id="editItemDialog" aria-labelledby="dialog-title">
      <form method="dialog" class="js-edit-item-form">
        <header class="dialog-header">
          <h2 id="dialog-title">Edit item</h2>

          <button
            type="submit"
            value="cancel"
            aria-label="Close dialog"
            class="dialog-close"
            formnovalidate
          >
            ×
          </button>
        </header>

        <div class="dialog-content">
          <div class="form-field">
            <label for="editProductName">Product name</label>
            <input
              id="editProductName"
              name="editProductName"
              type="text"
              required
            />
          </div>

          <div class="form-field">
            <label for="editProductPrice">Product price</label>
            <input
              id="editProductPrice"
              name="editProductPrice"
              type="number"
              inputmode="decimal"
              min="0"
              step="0.01"
              required
            />
          </div>

          <fieldset class="quantity-selector">
            <legend class="visually-hidden">Quantity</legend>

            <button
              type="button"
              aria-label="Decrease quantity"
              data-behavior="remove"
              class="js-btn-qty"
            >
              −
            </button>

            <output id="editQuantityValue" aria-live="polite"> 2 </output>

            <button
              type="button"
              aria-label="Increase quantity"
              data-behavior="add"
              class="js-btn-qty"
            >
              +
            </button>
          </fieldset>
        </div>

        <footer class="js-dialog-footer">
          <button
            type="submit"
            value="confirm"
            class="btn-primary js-submit-edit-item"
          >
            Save
          </button>
          <button
            type="submit"
            value="cancel"
            aria-label="Cancel edition"
            class="dialog-close"
            formnovalidate
          >
            Cancel
          </button>
        </footer>
      </form>
    </dialog>

    <!-- add friend dialog -->
    <dialog id="addFriendDialog" aria-labelledby="friendDialogTitle">
      <form method="dialog" class="js-add-friend-form">
        <header class="dialog-header">
          <h2 id="friendDialogTitle">Add new Friend</h2>

          <button
            type="submit"
            value="cancel"
            aria-label="Close dialog"
            class="dialog-close"
            formnovalidate
          >
            ×
          </button>
        </header>

        <div class="dialog-content">
          <div class="form-field">
            <label for="addFriendName">Name</label>
            <input
              id="addFriendName"
              name="addFriendName"
              type="text"
              required
            />
          </div>

          <fieldset class="avatar-picker">
            <legend>Choose your avatar</legend>

            <label>
              <input type="radio" name="avatar" value="avatar-1" />
              <img
                src="src/img/avatar-1.png"
                alt="Avatar with short black hair looking upward"
              />
            </label>

            <label>
              <input type="radio" name="avatar" value="avatar-2" />
              <img
                src="src/img/avatar-2.png"
                alt="Avatar with tall hair, glasses and green jacket"
              />
            </label>

            <label>
              <input type="radio" name="avatar" value="avatar-3" />
              <img
                src="src/img/avatar-3.png"
                alt="Avatar with bowl haircut wearing a purple shirt"
              />
            </label>

            <label>
              <input type="radio" name="avatar" value="avatar-4" />
              <img
                src="src/img/avatar-4.png"
                alt="Avatar of woman with long black hair wearing a purple top"
              />
            </label>

            <label>
              <input type="radio" name="avatar" value="avatar-5" />
              <img
                src="src/img/avatar-5.png"
                alt="Avatar of woman with curly hair wearing earrings and a pink shirt"
              />
            </label>
          </fieldset>
        </div>

        <footer class="js-dialog-footer">
          <button
            type="submit"
            value="confirm"
            class="btn-primary js-submit-add-friend"
          >
            Save
          </button>
          <button
            type="submit"
            value="cancel"
            aria-label="Cancel edition"
            class="dialog-close"
            formnovalidate
          >
            Cancel
          </button>
        </footer>
      </form>
    </dialog>
    <script type="module" src="/src/js/listController"></script>
  </body>
</html>
