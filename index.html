      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grocery List</title>
  </head>
  <body class="grocery-list__app-container">
    <header
      class="grocery-list__header-container flex justify-between items-center"
    >
      <div
        class="header__user-container flex justify-between items-center gap-16"
      >
        <figure>
          <img
            class="header__user-image"
            src="src/img/gen-avatar.png"
            alt="User's avatar"
          />
        </figure>
        <h1 class="header__user-name">Your grocery list:</h1>
      </div>

        <span class="material-symbols-outlined btn-icon">add</span> Add friend
      </button> -->
    </header>
    <main class="items__list-container">
      <section>
        <ul class="js-items__list items__list-wrap"></ul>
      </section>

      <section
        class="cart-summary js-summary flex justify-between"
        aria-labelledby="summary-title"
      >
        <div class="summary-info-container">
          <h3 id="summary-title" class="visually-hidden"></h3>
          <p class="summary-price"></p>
          <p class="summary-details"></p>
        </div>
        <button
          type="button"
          class="js-add-item-button btn btn-lg flex items-center gap-8 btn-primary btn-float"
        >
          <span class="material-symbols-outlined btn-icon">add</span> Item
        </button>
      </section>
    </main>
    <!-- Add item dialog -->
    <dialog class="dialog" id="addItemDialog" aria-labelledby="dialog-title">
      <form method="dialog" class="js-add-item-form">
        <header class="dialog-header flex justify-between items-center">
          <h2 id="dialog-title" class="dialog-title">New item</h2>

          <button
            type="submit"
            value="cancel"
            aria-label="Close dialog"
            class="js-dialog-close-btn btn btn-md btn__control"
            formnovalidate
          >
            <span class="material-symbols-outlined btn-icon">close</span>
          </button>
        </header>

        <div class="dialog-content">
          <div class="form-field">
            <label for="productName">Product name</label>
            <input id="productName" name="productName" type="text" required />
          </div>

          <div class="form-field">
            <label for="productPrice">Product price</label>
            <input
              id="productPrice"
              name="productPrice"
              type="number"
              inputmode="decimal"
              min="0"
              step="0.01"
              required
            />
          </div>

          <fieldset
            class="quantity-selector grocery-item__actions grocery-item__actions-dialog flex justify-between items-center gap-16"
          >
            <legend>Quantity</legend>

            <button
              type="button"
              aria-label="Decrease quantity"
              data-behavior="remove"
              class="js-btn-qty btn btn__control btn__control-remove"
            >
              −
            </button>

            <output id="quantityValue" aria-live="polite"> 2 </output>

            <button
              type="button"
              aria-label="Increase quantity"
              data-behavior="add"
              class="js-btn-qty btn btn__control btn__control-add"
            >
              +
            </button>
          </fieldset>
        </div>

        <footer class="js-dialog-footer"></footer>
      </form>
    </dialog>

    <!-- Edit item dialog -->
    <dialog class="dialog" id="editItemDialog" aria-labelledby="dialog-title">
      <form method="dialog" class="js-edit-item-form">
        <header class="dialog-header flex justify-between items-center">
          <h2 id="dialog-title" class="dialog-title">Edit item</h2>

          <button
            type="submit"
            value="cancel"
            aria-label="Close dialog"
            class="dialog-close btn btn-md btn__control"
            formnovalidate
          >
            <span class="material-symbols-outlined btn-icon">close</span>
          </button>
        </header>

        <div class="dialog-content">
          <div class="form-field">
            <label for="editProductName">Product name</label>
            <input
              id="editProductName"
              name="editProductName"
              type="text"
              required
            />
          </div>

          <div class="form-field">
            <label for="editProductPrice">Product price</label>
            <input
              id="editProductPrice"
              name="editProductPrice"
              type="number"
              inputmode="decimal"
              min="0"
              step="0.01"
              required
            />
          </div>

          <fieldset
            class="quantity-selector grocery-item__actions grocery-item__actions-dialog flex justify-between items-center gap-16"
          >
            <legend>Quantity</legend>

            <button
              type="button"
              aria-label="Decrease quantity"
              data-behavior="remove"
              class="js-btn-qty btn btn__control btn__control-remove"
            >
              <span class="material-symbols-outlined btn-icon">remove</span>
            </button>

            <output id="editQuantityValue" aria-live="polite"> 2 </output>

            <button
              type="button"
              aria-label="Increase quantity"
              data-behavior="add"
              class="js-btn-qty btn btn__control btn__control-add"
            >
              <span class="material-symbols-outlined btn-icon">add</span>
            </button>
          </fieldset>
        </div>

        <footer class="js-dialog-footer flex justify-between gap-16">
          <button
            type="submit"
            value="cancel"
            aria-label="Cancel edition"
            class="dialog-close btn btn-lg"
            formnovalidate
          >
            Cancel
          </button>
          <button
            type="submit"
            value="confirm"
            class="btn-primary btn btn-lg js-submit-edit-item"
          >
            Save
          </button>
        </footer>
      </form>
    </dialog>
